<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Hassas Tarım ve Tarımsal Robotlar Bölümü Sanal Laboratuvarı • Android</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    
:root{
  --bg0:#0B1B4D; --bg1:#152A66;
  --t:#F2F6FF; --m:rgba(242,246,255,.78);
  --p1:#7C6CFF; --p2:#FF5470; --g:#F7C55B; --ok:#2EE59D;
  --sh:0 18px 44px rgba(0,0,0,.35);
  color-scheme: dark;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; color:var(--t);
  background:
    radial-gradient(900px 520px at 12% -10%, rgba(124,108,255,.58), transparent 55%),
    radial-gradient(900px 520px at 100% 0%, rgba(255,84,112,.38), transparent 60%),
    radial-gradient(900px 520px at 55% 110%, rgba(247,197,91,.22), transparent 60%),
    linear-gradient(180deg, var(--bg0), var(--bg1));
}

    .top{position:sticky;top:0;z-index:10;padding:12px 12px 10px;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.12)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;min-width:260px;max-width:620px}
    .brand img{height:34px;width:auto;filter:drop-shadow(0 6px 18px rgba(0,0,0,.25))}
    .brand .tt{display:flex;flex-direction:column;line-height:1.05}
    .brand .tt b{font-size:13px;letter-spacing:.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:520px}
    .brand .tt span{font-size:12px;color:var(--m)}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.20);color:var(--m);font-size:12px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(46,229,157,.14)}
    .inp,.sel{padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:var(--t);outline:none}
    .inp{flex:1 1 220px;min-width:180px}
    .sel{flex:1 1 260px;min-width:220px}
    .btn{display:inline-flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:var(--t);cursor:pointer;transition:transform .12s ease,border-color .12s ease;-webkit-tap-highlight-color:transparent}
    .btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.30)}
    .btn:active{transform:translateY(0) scale(.99)}
    .btn[disabled]{opacity:.45;cursor:not-allowed;transform:none}
    .primary{border:0;background:linear-gradient(135deg, rgba(124,108,255,.95), rgba(255,84,112,.86));color:#0B1020;font-weight:900;box-shadow:0 14px 30px rgba(124,108,255,.18),0 10px 24px rgba(255,84,112,.12)}
    .wrap{padding:12px}
    .panel{border-radius:18px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);box-shadow:var(--sh);overflow:hidden;backdrop-filter:blur(10px)}
    model-viewer{width:100%;height:74vh;background:radial-gradient(700px 400px at 50% 20%, rgba(255,255,255,.10), transparent 55%)}
    .progress{position:absolute;left:14px;right:14px;bottom:14px;height:10px;border-radius:999px;background:rgba(255,255,255,.16);overflow:hidden;border:1px solid rgba(255,255,255,.18)}
    .bar{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg, rgba(124,108,255,.95), rgba(255,84,112,.92));transition:width .12s linear}
    .foot{text-align:center;padding:10px 12px 16px;font-size:11px;opacity:.75;letter-spacing:.2px}
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:rgba(10,16,32,.78);border:1px solid rgba(255,255,255,.18);padding:10px 12px;border-radius:14px;font-size:12px;display:none;backdrop-filter:blur(10px);box-shadow:0 12px 28px rgba(0,0,0,.35);z-index:999}
  </style>
</head>
<body>
  <div class="top">
    <div class="row">
      <div class="brand">
        <img src="assets/maku_logo.png" alt="MAKÜ">
        <div class="tt"><b>Hassas Tarım ve Tarımsal Robotlar Bölümü Sanal Laboratuvarı</b><span>Android</span></div>
      </div>

      <span class="chip"><span class="dot"></span><span id="status">Liste yükleniyor…</span></span>

      <input id="q" class="inp" placeholder="Model ara…" />
      <select id="sel" class="sel"></select>

      <button id="goAR" class="btn primary" disabled>AR Başlat</button>
      <button id="copy" class="btn">Link</button>
      <button id="refresh" class="btn">Yenile</button>

      <img src="assets/hatrob_logo.png" alt="HATROB" style="height:42px;width:auto;filter:drop-shadow(0 8px 22px rgba(0,0,0,.25));">
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <model-viewer id="mv" src=""
        ar ar-modes="scene-viewer webxr"
        ar-scale="auto" ar-placement="floor"
        camera-controls environment-image="neutral"
        shadow-intensity="1" touch-action="pan-y">
        <div class="progress" slot="progress-bar"><div class="bar" id="bar"></div></div>
      </model-viewer>
    </div>
  </div>

  <div class="foot">Bu uygulama Dr. Tahsin UYGUN tarafından hazırlanmıştır.</div>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    const api = window.HATROB;
    const sel = document.getElementById("sel");
    const mv = document.getElementById("mv");
    const goAR = document.getElementById("goAR");
    const bar = document.getElementById("bar");
    const statusEl = document.getElementById("status");
    const q = document.getElementById("q");
    const toast = document.getElementById("toast");

    let all = [];
    let filtered = [];
    let usdz = [];

    function show(msg){
      toast.textContent = msg;
      toast.style.display = "block";
      clearTimeout(show._t);
      show._t = setTimeout(()=>toast.style.display="none", 1400);
    }

    function fill(list){
      sel.innerHTML = "";
      list.forEach(p=>{
        const o = document.createElement("option");
        o.value = p;
        o.textContent = api.niceNameFromPath(p);
        sel.appendChild(o);
      });
    }

    function setModelByPath(path){
      if(!path) return;
      goAR.disabled = true;
      mv.src = api.encodePath(path);

      const u = new URL(location.href);
      u.searchParams.set("f", path);
      history.replaceState({}, "", u);
    }

    function applyFilter(){
      const t = (q.value||"").trim().toLowerCase();
      filtered = !t ? all : all.filter(p => api.niceNameFromPath(p).toLowerCase().includes(t));
      fill(filtered);
      if(sel.value) setModelByPath(sel.value);
    }

    async function init(force=false){
      statusEl.textContent = force ? "Yenileniyor…" : "Liste yükleniyor…";
      try{
        const payload = await api.getRepoFiles({forceRefresh: force});
        all = payload.models || [];
        usdz = payload.usdz || [];
        statusEl.textContent = all.length ? `${all.length} model` : "Model bulunamadı";
        applyFilter();

        const qp = new URL(location.href).searchParams.get("f");
        if(qp && all.includes(qp)){
          sel.value = qp;
          setModelByPath(qp);
        }
      }catch(e){
        console.error(e);
        statusEl.textContent = "Liste alınamadı";
        show("GitHub API sınırı / ağ sorunu");
      }
    }

    q.addEventListener("input", applyFilter);
    sel.addEventListener("change", ()=> setModelByPath(sel.value));

    mv.addEventListener("progress", e=>{
      const p = Math.max(0, Math.min(1, e.detail.totalProgress || 0));
      bar.style.width = `${Math.round(p*100)}%`;
    });
    mv.addEventListener("load", ()=> goAR.disabled = false);
    mv.addEventListener("error", ()=>{ goAR.disabled = true; show("Model yüklenemedi"); });

    goAR.addEventListener("click", async ()=>{ try{ await mv.activateAR(); }catch{} });

    document.getElementById("copy").addEventListener("click", async ()=>{
      try{ await navigator.clipboard.writeText(location.href); show("Link kopyalandı ✓"); }
      catch{ show("Kopyalama desteklenmiyor"); }
    });

    document.getElementById("refresh").addEventListener("click", ()=>{ api.clearCache(); init(true); });

    init(false);
  </script>
</body>
</html>
